services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://cmuser:cmpass@db:5432/capital_markets
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cmuser
      POSTGRES_PASSWORD: cmpass
      POSTGRES_DB: capital_markets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmuser -d capital_markets"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: